services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: expense-tracker-backend:local
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./expense-tracker
      dockerfile: Dockerfile
    image: expense-tracker-frontend:local
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
